<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <!-- Custom css file link  -->
    <link href='https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400;600&display=swap' rel='stylesheet'>
    <link rel="stylesheet" href="css/reset-password.css">
</head>
<body>
    <h2>Set a new password</h2>
    <input type="password" id="newPassword" placeholder="New password">
    <button id="resetBtn">Update password</button>
    <p id="resetMessage"></p>
    <script>
        // Läs token ur adressen:  ...reset-password.html?token=XXXX
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        document.getElementById('resetBtn').addEventListener('click', function() {
            const newPassword = document.getElementById('newPassword').value;

            fetch('/user/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            })
            .then(async response => {
                const data = await response.json();
                document.getElementById('resetMessage').innerText = data.message;
                if (response.ok) {
                    setTimeout(() => { window.location.href = "/login.html"; }, 2000);  // till login efter 2s
                }
            })
            .catch(() => {
                document.getElementById('resetMessage').innerText = "Something went wrong.";
            });
        });
    </script>
</body>
</html>
